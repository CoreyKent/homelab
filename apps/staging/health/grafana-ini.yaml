apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-ini
data:
  grafana.ini: |
    [auth.anonymous]
    enabled = false

    [users]
    allow_sign_up = false

    [snapshots]
    ; External snapshots would push rendered health data outside the tailnet boundary.
    external_enabled = false

    [public_dashboards]
    enabled = false

    [analytics]
    reporting_enabled = false
    check_for_updates = false

    [dashboards]
    default_home_dashboard_path = /var/lib/grafana/dashboards/overview.json

    [date_formats]
    full_date = DD/MM/YYYY HH:mm:ss
    interval_second = HH:mm:ss
    interval_minute = HH:mm
    interval_hour = DD/MM HH:mm
    interval_day = DD/MM
    interval_month = MM/YYYY
    interval_year = YYYY
