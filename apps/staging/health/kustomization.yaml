apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: health
resources:
  - ../../base/health/
  # Co-located so the Cluster's managed roles get their SOPS-encrypted credentials in one apply.
  - pg-qs-writer.secret.yaml
  - pg-qs-reader.secret.yaml
  - withings-app.secret.yaml
  # Garmin tokenstore seed — sealed from Corey MFA bootstrap 23/07/2026; DB becomes authoritative after first run.
  - garmin-tokenstore.secret.yaml
  - cluster.yaml
  - migrations.yaml
  - migrate-job.yaml
  - backup-pvc.yaml
  - pgdump-cronjob.yaml
  - garmin-cronjob.yaml
  - withings-cronjob.yaml
  # Grafana admin secret — sealed by the orchestrator; referenced here, never authored by the builder.
  - grafana-admin.secret.yaml
  - grafana-deployment.yaml
  - grafana-service.yaml
  - grafana-certificate.yaml
  - grafana-ingressroute.yaml
  - grafana-ini.yaml
  - grafana-datasource.yaml
  - grafana-dashboards-provider.yaml
  - grafana-dashboard-garmin.yaml
  - grafana-dashboard-withings.yaml
  - grafana-dashboard-overview.yaml
# backfill-job.yaml is intentionally excluded: it is a manual kubectl create -f template, and Jobs are immutable.
