apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: health
resources:
  - ../../base/health/
  # Co-located so the Cluster's managed roles get their SOPS-encrypted credentials in one apply.
  - pg-qs-writer.secret.yaml
  - pg-qs-reader.secret.yaml
  - withings-app.secret.yaml
  # Garmin tokenstore seed — sealed from Corey MFA bootstrap 23/07/2026; DB becomes authoritative after first run.
  - garmin-tokenstore.secret.yaml
  - cluster.yaml
  - migrations.yaml
  - migrate-job.yaml
  - backup-pvc.yaml
  - pgdump-cronjob.yaml
  - garmin-cronjob.yaml
  - withings-cronjob.yaml
# backfill-job.yaml is intentionally excluded: it is a manual kubectl create -f template, and Jobs are immutable.
