              "datasource": {
                "type": "postgres",
                "uid": "health-pg"
              },
              "format": "table",
              "rawQuery": true,
              "rawSql": "SELECT source AS \"source\", EXTRACT(EPOCH FROM (now() - max(watermark))) / 3600.0 AS \"hours\" FROM ops.sync_state WHERE stream NOT LIKE '\\_%' GROUP BY source ORDER BY source",
              "refId": "A"
            }
          ]
        }
