          "title": "Ingestion — last 10 runs",
          "type": "table",
          "datasource": {
            "type": "postgres",
            "uid": "health-pg"
          },
          "gridPos": {
            "h": 7,
            "w": 16,
            "x": 0,
            "y": 18
          },
          "fieldConfig": {
            "defaults": {},
            "overrides": [
              {
                "matcher": {
                  "id": "byName",
                  "options": "Status"
                },
                "properties": [
                  {
                    "id": "mappings",
                    "value": [
                      {
                        "type": "value",
                        "options": {
                          "ok": {
                            "text": "ok",
                            "color": "green"
                          },
                          "partial": {
                            "text": "partial",
                            "color": "yellow"
                          },
                          "failed": {
                            "text": "failed",
                            "color": "red"
                          }
                        }
                      }
                    ]
                  },
                  {
                    "id": "custom.cellOptions",
                    "value": {
                      "type": "color-text"
                    }
                  }
                ]
              },
              {
                "matcher": {
                  "id": "byName",
                  "options": "First error"
                },
                "properties": [
                  {
                    "id": "custom.inspect",
                    "value": true
                  },
                  {
                    "id": "custom.width",
                    "value": 360
                  }
                ]
              }
            ]
          },
          "options": {
            "showHeader": true
          },
          "targets": [
            {
              "datasource": {
                "type": "postgres",
                "uid": "health-pg"
