          "fieldConfig": {
            "defaults": {
              "unit": "h",
              "decimals": 1,
              "noValue": "No syncs yet",
              "color": {
                "mode": "thresholds"
              },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "green",
                    "value": null
                  },
                  {
                    "color": "yellow",
                    "value": 6
                  },
                  {
                    "color": "red",
                    "value": 24
                  }
                ]
              }
            },
            "overrides": []
          },
          "options": {
            "reduceOptions": {
              "values": true,
              "fields": "/hours/",
              "calcs": [
                "lastNotNull"
              ]
            },
            "textMode": "value_and_name",
            "colorMode": "value",
            "graphMode": "none"
