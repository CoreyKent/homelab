          "id": 14,
          "title": "Source staleness (h since watermark)",
          "type": "stat",
          "datasource": {
            "type": "postgres",
            "uid": "health-pg"
          },
          "gridPos": {
            "h": 7,
            "w": 8,
            "x": 16,
            "y": 18
