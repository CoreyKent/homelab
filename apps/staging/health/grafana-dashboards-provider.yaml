apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboards-provider
data:
  dashboards.yaml: |
    apiVersion: 1
    providers:
      # Git is the only edit path; mounted dashboards are authoritative and UI writes are disabled.
      - name: health-dashboards
        type: file
        folder: Health
        disableDeletion: true
        allowUiUpdates: false
        updateIntervalSeconds: 30
        options:
          path: /var/lib/grafana/dashboards
