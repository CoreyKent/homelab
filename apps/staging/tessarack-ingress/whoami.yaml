# Throwaway end-to-end proof for BOTH paths. Delete once the pattern is confirmed.
#
# pub.tessarack.dev   -> proxied CNAME -> tunnel -> Traefik -> here   (must work publicly)
# priv.tessarack.dev  -> grey A record -> Traefik on tailnet -> here  (must FAIL off-tailnet)
#
# Same backend, same IngressRoute shape. The only difference between public and
# private is the DNS record — which is the whole point of the design.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: whoami
spec:
  replicas: 1
  selector:
    matchLabels:
      app: whoami
  template:
    metadata:
      labels:
        app: whoami
    spec:
      containers:
      - name: whoami
        image: traefik/whoami:v1.11.0
        ports:
        - containerPort: 80
        resources:
          requests:
            cpu: 10m
            memory: 16Mi
          limits:
            memory: 64Mi
---
apiVersion: v1
kind: Service
metadata:
  name: whoami
spec:
  selector:
    app: whoami
  ports:
  - port: 80
    targetPort: 80
---
# Both routes listen on BOTH entrypoints, and both attach the same wildcard cert.
#
#   web (:80)       - what cloudflared hands traffic to. TLS already terminated
#                     at the Cloudflare edge, so this leg is plain HTTP inside
#                     the cluster and never seen by a browser.
#   websecure (:443) - what a tailnet client hits directly. No Cloudflare in this
#                     path, so Traefik must present a publicly-trusted cert here.
#                     `.dev` is HSTS-preloaded, which makes a cert error
#                     NON-BYPASSABLE — there is no "Advanced -> Proceed".
#
# Identical config for public and private is the point: which one a name becomes
# is decided entirely by its DNS record.
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: whoami-public
spec:
  entryPoints:
    - web
    - websecure
  routes:
  - match: Host(`pub.tessarack.dev`)
    kind: Rule
    services:
    - name: whoami
      port: 80
  tls:
    secretName: tessarack-dev-wildcard-tls
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: whoami-private
spec:
  entryPoints:
    - web
    - websecure
  routes:
  - match: Host(`priv.tessarack.dev`)
    kind: Rule
    services:
    - name: whoami
      port: 80
  tls:
    secretName: tessarack-dev-wildcard-tls
