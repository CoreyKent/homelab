# Throwaway end-to-end proof for BOTH paths. Delete once the pattern is confirmed.
#
# pub.tessarack.dev   -> proxied CNAME -> tunnel -> Traefik :80 (web)      (public)
# priv.tessarack.dev  -> grey A record -> Traefik :443 (websecure) on tailnet (private)
#
# The public and private routes are NOT identical — they differ by how they're
# reached, and that difference is load-bearing (see each route's comment below).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: whoami
spec:
  replicas: 1
  selector:
    matchLabels:
      app: whoami
  template:
    metadata:
      labels:
        app: whoami
    spec:
      containers:
      - name: whoami
        image: traefik/whoami:v1.11.0
        ports:
        - containerPort: 80
        resources:
          requests:
            cpu: 10m
            memory: 16Mi
          limits:
            memory: 64Mi
---
apiVersion: v1
kind: Service
metadata:
  name: whoami
spec:
  selector:
    app: whoami
  ports:
  - port: 80
    targetPort: 80
---
# PUBLIC route — reached only via cloudflared, which connects to Traefik on :80
# (the `web` entrypoint) as plain HTTP. TLS is terminated at the Cloudflare edge,
# so this router must NOT carry a `tls:` block: a tls block turns the router into
# a TLS router, and a plaintext request on :80 then matches nothing -> 404.
# (Verified 2026-07-21: web + no-tls serves; web + tls 404s.)
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: whoami-public
spec:
  entryPoints:
    - web
  routes:
  - match: Host(`pub.tessarack.dev`)
    kind: Rule
    services:
    - name: whoami
      port: 80
---
# PRIVATE route — reached directly by a tailnet client on :443 (the `websecure`
# entrypoint). No Cloudflare in this path, so Traefik terminates TLS itself with
# the wildcard cert. `.dev` is HSTS-preloaded, so a cert error here is
# NON-BYPASSABLE. This router DOES need the tls block, and only websecure.
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: whoami-private
spec:
  entryPoints:
    - websecure
  routes:
  - match: Host(`priv.tessarack.dev`)
    kind: Rule
    services:
    - name: whoami
      port: 80
  tls:
    secretName: tessarack-dev-wildcard-tls
