# Lives here, not in infrastructure/configs, because Traefik resolves an
# IngressRoute's TLS secret within the IngressRoute's OWN namespace. The
# Certificate must therefore produce its secret in tessarack-ingress.
#
# The ClusterIssuer it references is cluster-scoped, so the cross-namespace
# reference is fine in that direction.
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: tessarack-dev-wildcard
  namespace: tessarack-ingress
spec:
  secretName: tessarack-dev-wildcard-tls
  issuerRef:
    # Start on staging. Flip to letsencrypt-prod once a challenge completes
    # and `kubectl describe certificate` shows Ready=True.
    name: letsencrypt-staging
    kind: ClusterIssuer
  commonName: tessarack.dev
  dnsNames:
    # Both entries are needed — a wildcard does not cover the bare apex.
    - tessarack.dev
    - "*.tessarack.dev"
  privateKey:
    algorithm: ECDSA
    size: 256
    rotationPolicy: Always
  # cert-manager renews at ~2/3 of lifetime by default. Stated explicitly so the
  # renewal behaviour is visible in Git rather than implied.
  duration: 2160h    # 90d
  renewBefore: 720h  # 30d
