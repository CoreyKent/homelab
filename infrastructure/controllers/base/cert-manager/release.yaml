apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: cert-manager
  namespace: cert-manager
spec:
  interval: 30m
  chart:
    spec:
      chart: cert-manager
      # Chart v1.21.0 confirmed present in the Jetstack index (2026-07-19).
      version: "v1.21.0"
      sourceRef:
        kind: HelmRepository
        name: jetstack
        namespace: cert-manager
      interval: 12h
  install:
    crds: Create
  upgrade:
    crds: CreateReplace
  driftDetection:
    mode: enabled
  values:
    crds:
      enabled: true
    # CoreDNS forwards to the node's /etc/resolv.conf, which points at the LAN
    # resolvers (192.168.50.254/.127/.1). cert-manager's DNS-01 self-check would
    # inherit that path and depend on how those resolvers answer public zones.
    # Pinning the self-check to public resolvers removes the variable — a wrong
    # answer here stalls the challenge silently rather than failing loudly.
    dns01RecursiveNameservers: "1.1.1.1:53,8.8.8.8:53"
    dns01RecursiveNameserversOnly: true
    resources:
      requests:
        cpu: 10m
        memory: 64Mi
      limits:
        memory: 256Mi
