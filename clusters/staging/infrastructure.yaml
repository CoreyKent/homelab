apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: infra-controllers
  namespace: flux-system
spec:
  interval: 1h
  retryInterval: 1m
  timeout: 5m
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./infrastructure/controllers/staging
  prune: true
  # ADDED: the tailscale-operator's SOPS-encrypted `operator-oauth` secret lives
  # under this path (co-located with the operator so it applies in the same
  # Kustomization, avoiding a dependsOn deadlock). Without this block that secret
  # would be applied still-encrypted. Mirrors the `apps`/`infra-configs` blocks;
  # the `sops-age` secret in flux-system already exists.
  decryption:
    provider: sops
    secretRef:
      name: sops-age
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: infra-configs
  namespace: flux-system
spec:
  dependsOn:
    - name: infra-controllers
  interval: 1h
  retryInterval: 1m
  timeout: 5m
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./infrastructure/configs/staging
  prune: true
  # ADDED: without this, the SOPS-encrypted cloudflare-api-token secret in
  # infrastructure/configs/staging is applied still-encrypted and cert-manager
  # cannot read it. Mirrors the block already on the `apps` Kustomization; the
  # `sops-age` secret in flux-system already exists and is what `apps` uses.
  decryption:
    provider: sops
    secretRef:
      name: sops-age
